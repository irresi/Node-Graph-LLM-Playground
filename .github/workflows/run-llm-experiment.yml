name: Run LLM Experiment

on:
  repository_dispatch:
    types: [run-llm-experiment]
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model (haiku, sonnet, opus)'
        required: false
        default: 'haiku'
      mode:
        description: 'Run mode: views-only, backtest-only, full'
        required: false
        default: 'views-only'
      clear_cache:
        description: 'Clear existing view cache before running'
        required: false
        default: 'false'
      pipeline:
        description: 'Pipeline: single-agent, multi-agent, both'
        required: false
        default: 'single-agent'
      enrich:
        description: 'Enrich prompts with governance/yield/news (Phase B)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  generate-views:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Parse parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "model=${{ github.event.client_payload.model || 'haiku' }}" >> $GITHUB_OUTPUT
            echo "mode=${{ github.event.client_payload.mode || 'views-only' }}" >> $GITHUB_OUTPUT
            echo "clear_cache=${{ github.event.client_payload.clear_cache || 'false' }}" >> $GITHUB_OUTPUT
            echo "pipeline=${{ github.event.client_payload.pipeline || 'single-agent' }}" >> $GITHUB_OUTPUT
            echo "enrich=${{ github.event.client_payload.enrich || 'false' }}" >> $GITHUB_OUTPUT
            echo "caller_run_id=${{ github.event.client_payload.caller_run_id || 'manual' }}" >> $GITHUB_OUTPUT
            echo "main_repo_sha=${{ github.event.client_payload.main_repo_sha || 'HEAD' }}" >> $GITHUB_OUTPUT
          else
            echo "model=${{ github.event.inputs.model || 'haiku' }}" >> $GITHUB_OUTPUT
            echo "mode=${{ github.event.inputs.mode || 'views-only' }}" >> $GITHUB_OUTPUT
            echo "clear_cache=${{ github.event.inputs.clear_cache || 'false' }}" >> $GITHUB_OUTPUT
            echo "pipeline=${{ github.event.inputs.pipeline || 'single-agent' }}" >> $GITHUB_OUTPUT
            echo "enrich=${{ github.event.inputs.enrich || 'false' }}" >> $GITHUB_OUTPUT
            echo "caller_run_id=manual" >> $GITHUB_OUTPUT
            echo "main_repo_sha=HEAD" >> $GITHUB_OUTPUT
          fi

      - name: Checkout Playground repo
        uses: actions/checkout@v6

      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          repository: irresi/Node-Graph-LLM
          token: ${{ secrets.GH_MAIN_REPO_TOKEN }}
          path: main-repo
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: main-repo/requirements.txt

      - name: Install Python dependencies
        run: pip install -r main-repo/requirements.txt

      - name: Install Claude CLI
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          npm install -g @anthropic-ai/claude-code
          echo "Claude CLI installed: $(claude --version 2>/dev/null || echo 'version check failed')"

      - name: Prepare workspace
        run: |
          mkdir -p workspace/artifacts/llm_views
          mkdir -p workspace/artifacts/llm_views/multi_agent
          mkdir -p workspace/artifacts/llm_views/enriched
          mkdir -p workspace/artifacts/experiments/real_llm

          # Copy existing single-agent cache from main repo
          if [ "${{ steps.params.outputs.clear_cache }}" = "true" ]; then
            echo "Cache cleared (clear_cache=true)"
          else
            if [ -d main-repo/artifacts/llm_views ]; then
              CACHED=$(ls main-repo/artifacts/llm_views/*.json 2>/dev/null | wc -l)
              cp main-repo/artifacts/llm_views/*.json workspace/artifacts/llm_views/ 2>/dev/null || true
              echo "Copied $CACHED cached single-agent view files from main repo"
            fi
            # Copy existing multi-agent cache from main repo
            if [ -d main-repo/artifacts/llm_views/multi_agent ]; then
              MA_CACHED=$(ls main-repo/artifacts/llm_views/multi_agent/*.json 2>/dev/null | wc -l)
              cp main-repo/artifacts/llm_views/multi_agent/*.json workspace/artifacts/llm_views/multi_agent/ 2>/dev/null || true
              echo "Copied $MA_CACHED cached multi-agent view files from main repo"
            fi
            # Copy existing enriched cache from main repo
            if [ -d main-repo/artifacts/llm_views/enriched ]; then
              EN_CACHED=$(ls main-repo/artifacts/llm_views/enriched/*.json 2>/dev/null | wc -l)
              cp main-repo/artifacts/llm_views/enriched/*.json workspace/artifacts/llm_views/enriched/ 2>/dev/null || true
              echo "Copied $EN_CACHED cached enriched view files from main repo"
            fi
          fi

      - name: Generate LLM views
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          CLAUDECODE: ""
        working-directory: main-repo
        run: |
          MODEL="${{ steps.params.outputs.model }}"
          MODE="${{ steps.params.outputs.mode }}"
          PIPELINE="${{ steps.params.outputs.pipeline }}"
          ENRICH="${{ steps.params.outputs.enrich }}"
          CACHE_DIR="${GITHUB_WORKSPACE}/workspace/artifacts/llm_views"
          MA_CACHE_DIR="${GITHUB_WORKSPACE}/workspace/artifacts/llm_views/multi_agent"
          ENRICHED_CACHE_DIR="${GITHUB_WORKSPACE}/workspace/artifacts/llm_views/enriched"
          OUTPUT_DIR="${GITHUB_WORKSPACE}/workspace/artifacts/experiments/real_llm"

          FLAGS=""
          if [ "$MODE" = "views-only" ]; then
            FLAGS="--views-only"
          elif [ "$MODE" = "backtest-only" ]; then
            FLAGS="--backtest-only"
          fi

          # Add multi-agent flag based on pipeline setting
          if [ "$PIPELINE" = "multi-agent" ] || [ "$PIPELINE" = "both" ]; then
            FLAGS="$FLAGS --multi-agent --multi-agent-cache-dir $MA_CACHE_DIR"
          fi

          # Add enrich flag if requested
          if [ "$ENRICH" = "true" ]; then
            FLAGS="$FLAGS --enrich --enriched-cache-dir $ENRICHED_CACHE_DIR"
          fi

          echo "=== Running LLM Experiment ==="
          echo "  Model: $MODEL"
          echo "  Mode: $MODE"
          echo "  Pipeline: $PIPELINE"
          echo "  Enrich: $ENRICH"
          echo "  Cache dir: $CACHE_DIR"
          echo "  Multi-agent cache dir: $MA_CACHE_DIR"
          echo "  Enriched cache dir: $ENRICHED_CACHE_DIR"
          echo "  Output dir: $OUTPUT_DIR"
          echo ""

          python scripts/generate_llm_views.py \
            --model "$MODEL" \
            --prices-dir artifacts/data/prices \
            --protocols-dir artifacts/data/protocols \
            --cache-dir "$CACHE_DIR" \
            --enriched-cache-dir "$ENRICHED_CACHE_DIR" \
            --output-dir "$OUTPUT_DIR" \
            $FLAGS

      - name: Prepare results
        id: results
        run: |
          mkdir -p results/llm_views
          mkdir -p results/llm_views/multi_agent
          mkdir -p results/llm_views/enriched
          mkdir -p results/experiments/real_llm

          cp workspace/artifacts/llm_views/*.json results/llm_views/ 2>/dev/null || true
          cp workspace/artifacts/llm_views/multi_agent/*.json results/llm_views/multi_agent/ 2>/dev/null || true
          cp workspace/artifacts/llm_views/enriched/*.json results/llm_views/enriched/ 2>/dev/null || true
          cp workspace/artifacts/experiments/real_llm/* results/experiments/real_llm/ 2>/dev/null || true

          VIEW_COUNT=$(ls results/llm_views/*.json 2>/dev/null | wc -l)
          MA_VIEW_COUNT=$(ls results/llm_views/multi_agent/*.json 2>/dev/null | wc -l)
          EN_VIEW_COUNT=$(ls results/llm_views/enriched/*.json 2>/dev/null | wc -l)
          echo "view_count=$VIEW_COUNT" >> $GITHUB_OUTPUT
          echo "ma_view_count=$MA_VIEW_COUNT" >> $GITHUB_OUTPUT
          echo "en_view_count=$EN_VIEW_COUNT" >> $GITHUB_OUTPUT

          cat > results/metadata.json << EOF
          {
            "model": "${{ steps.params.outputs.model }}",
            "mode": "${{ steps.params.outputs.mode }}",
            "pipeline": "${{ steps.params.outputs.pipeline }}",
            "enrich": "${{ steps.params.outputs.enrich }}",
            "clear_cache": "${{ steps.params.outputs.clear_cache }}",
            "caller_run_id": "${{ steps.params.outputs.caller_run_id }}",
            "main_repo_sha": "${{ steps.params.outputs.main_repo_sha }}",
            "completed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "status": "success",
            "view_count": $VIEW_COUNT,
            "multi_agent_view_count": $MA_VIEW_COUNT,
            "enriched_view_count": $EN_VIEW_COUNT,
            "workflow_run_id": "${{ github.run_id }}"
          }
          EOF

          echo "=== Results ==="
          echo "  Single-agent views: $VIEW_COUNT"
          echo "  Multi-agent views: $MA_VIEW_COUNT"
          echo "  Enriched views: $EN_VIEW_COUNT"
          cat results/metadata.json

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: llm-experiment-results
          path: results/
          retention-days: 7

      - name: Commit results to Playground
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "experiment: LLM views (${{ steps.params.outputs.model }}, ${{ steps.params.outputs.pipeline }}, enrich=${{ steps.params.outputs.enrich }}) - ${{ steps.results.outputs.view_count }}+${{ steps.results.outputs.ma_view_count }}+${{ steps.results.outputs.en_view_count }} views"
          git push || echo "Push failed (non-fatal)"
